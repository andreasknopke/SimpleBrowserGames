<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vier Gewinnt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="game-selection">
            <button id="btnFourWins" class="game-template-btn active">Vier Gewinnt</button>
            <button id="btnMinesweeper" class="game-template-btn">Minesweeper</button>
            <button id="btnTetris" class="game-template-btn">Tetris</button>
            <button id="btnSnake" class="game-template-btn">Snake</button>
            <button id="btnPong" class="game-template-btn">Pong</button>
        </div>

        <div id="fourWinsContainer" class="game-container">
            <div class="container">
                <h1 id="gameTitle">Vier Gewinnt</h1>
                
                <div class="controls">
                    <div class="mode-selection">
                        <label for="gameMode">Modus:</label>
                        <select id="gameMode">
                            <option value="2p">2 Spieler</option>
                            <option value="1p">1 Spieler (vs Computer)</option>
                        </select>
                    </div>

                    <div id="difficultyContainer" class="difficulty-selection" style="display: none;">
                        <label for="difficulty">Schwierigkeit:</label>
                        <select id="difficulty">
                            <option value="1">Leicht</option>
                            <option value="2">Mittel</option>
                            <option value="3">Schwer</option>
                            <option value="4">Extrem Schwer</option>
                        </select>
                    </div>

                    <button id="resetBtn">Neues Spiel</button>
                </div>

                <div id="status">Spieler 1 (Rot) ist am Zug</div>

                <div id="board" class="board">
                    <!-- Board will be generated by JS -->
                </div>
            </div>
        </div>

        <div id="minesweeperContainer" class="game-container" style="display: none;">
            <div class="container">
                <h1>Minesweeper</h1>
                <div class="controls">
                    <div class="difficulty-selection">
                        <label for="msDifficulty">Schwierigkeit:</label>
                        <select id="msDifficulty">
                            <option value="easy">Leicht</option>
                            <option value="medium">Mittel</option>
                            <option value="hard">Schwer</option>
                        </select>
                    </div>
                    <button id="resetMsBtn">Neues Spiel</button>
                </div>
                <div id="msStatus">Minen: 10</div>
                <div id="msBoard" class="ms-board">
                    <!-- Board will be generated by CF -->
                </div>
            </div>
        </div>

        <div id="tetrisContainer" class="game-container" style="display: none;">
            <div class="container">
                <h1>Tetris</h1>
                <div class="controls">
                    <button id="resetTetrisBtn">Neues Spiel</button>
                </div>
                <div id="tetrisStatus">Punkte: 0</div>
                <div class="tetris-game-area">
                    <canvas id="tetrisCanvas" width="200" height="400"></canvas>
                    <div class="tetris-sidebar">
                        <div class="next-piece-container">
                            <p>Nächster Stein:</p>
                            <canvas id="nextPieceCanvas" width="100" height="100"></canvas>
                        </div>
                    </div>
                </div>
                <div class="tetris-mobile-controls">
                    <div class="tetris-controls-row">
                        <button id="tetrisBtnRotate" class="tetris-ctrl-btn">⟳ Drehen</button>
                    </div>
                    <div class="tetris-controls-row">
                        <button id="tetrisBtnLeft" class="tetris-ctrl-btn">◀ Links</button>
                        <button id="tetrisBtnDown" class="tetris-ctrl-btn">▼ Runter</button>
                        <button id="tetrisBtnRight" class="tetris-ctrl-btn">▶ Rechts</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="snakeContainer" class="game-container" style="display: none;">
            <div class="container">
                <h1>Snake</h1>
                <div class="controls">
                    <button id="resetSnakeBtn">Neues Spiel</button>
                </div>
                <div id="snakeStatus">Punkte: 0</div>
                <div class="snake-game-area">
                    <canvas id="snakeCanvas" width="400" height="400"></canvas>
                </div>
                <div class="snake-mobile-controls">
                    <div class="snake-controls-row">
                        <button id="snakeBtnUp" class="snake-ctrl-btn">▲</button>
                    </div>
                    <div class="snake-controls-row">
                        <button id="snakeBtnLeft" class="snake-ctrl-btn">◀</button>
                        <button id="snakeBtnDown" class="snake-ctrl-btn">▼</button>
                        <button id="snakeBtnRight" class="snake-ctrl-btn">▶</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="pongContainer" class="game-container" style="display: none;">
            <div class="container">
                <h1>Pong</h1>
                <div class="controls">
                    <div class="mode-selection">
                        <label for="pongMode">Modus:</label>
                        <select id="pongMode">
                            <option value="2p">2 Spieler</option>
                            <option value="1p">1 Spieler (vs Computer)</option>
                        </select>
                    </div>
                    <button id="resetPongBtn">Neues Spiel</button>
                </div>
                <div id="pongStatus">Player 1: 0 | Player 2: 0</div>
                <div class="pong-game-area">
                    <canvas id="pongCanvas" width="600" height="400"></canvas>
                </div>
                <div class="pong-mobile-controls">
                    <div class="pong-controls-row">
                        <button id="pongBtnLeftUp" class="pong-ctrl-btn">P1 ▲</button>
                        <button id="pongBtnLeftDown" class="pong-ctrl-btn">P1 ▼</button>
                        <span class="pong-label">|</span>
                        <button id="pongBtnRightUp" class="pong-ctrl-btn">P2 ▲</button>
                        <button id="pongBtnRightDown" class="pong-ctrl-btn">P2 ▼</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
