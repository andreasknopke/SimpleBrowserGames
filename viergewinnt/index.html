<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spielhalle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="game-selection">
            <button id="btnFourWins" class="game-grid-btn active" data-game="fourWins">
                <span class="btn-icon">🔴</span>
                <span class="btn-label">Vier Gewinnt</span>
            </button>
            <button id="btnMinesweeper" class="game-grid-btn" data-game="minesweeper">
                <span class="btn-icon">💣</span>
                <span class="btn-label">Minesweeper</span>
            </button>
            <button id="btnTetris" class="game-grid-btn" data-game="tetris">
                <span class="btn-icon">🧱</span>
                <span class="btn-label">Tetris</span>
            </button>
            <button id="btnSnake" class="game-grid-btn" data-game="snake">
                <span class="btn-icon">🐍</span>
                <span class="btn-label">Snake</span>
            </button>
            <button id="btnPong" class="game-grid-btn" data-game="pong">
                <span class="btn-icon">🏓</span>
                <span class="btn-label">Pong</span>
            </button>
            <button id="btnSpaceInvaders" class="game-grid-btn" data-game="spaceInvaders">
                <span class="btn-icon">👾</span>
                <span class="btn-label">Space Invaders</span>
            </button>
            <button id="btnBreakout" class="game-grid-btn" data-game="breakout">
                <span class="btn-icon">🧱</span>
                <span class="btn-label">Breakout</span>
            </button>
            <button id="btnBoulderDash" class="game-grid-btn" data-game="boulderDash">
                <span class="btn-icon">🪨</span>
                <span class="btn-label">Boulder Dash</span>
            </button>
        </div>

        <div id="fourWinsContainer" class="game-container">
            <div class="container">
                <h1 id="gameTitle">Vier Gewinnt</h1>
                
                <div class="controls">
                    <div class="mode-selection">
                        <label for="gameMode">Modus:</label>
                        <select id="gameMode">
                            <option value="2p">2 Spieler</option>
                            <option value="1p">1 Spieler (vs Computer)</option>
                        </select>
                    </div>

                    <div id="difficultyContainer" class="difficulty-selection" style="display: none;">
                        <label for="difficulty">Schwierigkeit:</label>
                        <select id="difficulty">
                            <option value="1">Leicht</option>
                            <option value="2">Mittel</option>
                            <option value="3">Schwer</option>
                            <option value="4">Extrem Schwer</option>
                        </select>
                    </div>

                    <button id="resetBtn">Neues Spiel</button>
                </div>

                <div id="status">Spieler 1 (Rot) ist am Zug</div>

                <div id="board" class="board">
                    <!-- Board will be generated by JS -->
                </div>
            </div>
        </div>

        <div id="minesweeperContainer" class="game-container" style="display: none;">
            <div class="container">
                <h1>Minesweeper</h1>
                <div class="controls">
                    <div class="difficulty-selection">
                        <label for="msDifficulty">Schwierigkeit:</label>
                        <select id="msDifficulty">
                            <option value="easy">Leicht</option>
                            <option value="medium">Mittel</option>
                            <option value="hard">Schwer</option>
                        </select>
                    </div>
                    <button id="resetMsBtn">Neues Spiel</button>
                </div>
                <div id="msStatus">Minen: 10</div>
                <div id="msBoard" class="ms-board">
                    <!-- Board will be generated by CF -->
                </div>
            </div>
        </div>

        <div id="tetrisContainer" class="game-container" style="display: none;">
            <div class="container">
                <h1>Tetris</h1>
                <div class="controls">
                    <button id="resetTetrisBtn">Neues Spiel</button>
                </div>
                <div id="tetrisStatus">Punkte: 0</div>
                <div class="tetris-game-area">
                    <canvas id="tetrisCanvas" width="200" height="400"></canvas>
                    <div class="tetris-sidebar">
                        <div class="next-piece-container">
                            <p>Nächster Stein:</p>
                            <canvas id="nextPieceCanvas" width="100" height="100"></canvas>
                        </div>
                    </div>
                </div>
                <div class="tetris-mobile-controls">
                    <div class="tetris-controls-row">
                        <button id="tetrisBtnRotate" class="tetris-ctrl-btn">⟳ Drehen</button>
                    </div>
                    <div class="tetris-controls-row">
                        <button id="tetrisBtnLeft" class="tetris-ctrl-btn">◀ Links</button>
                        <button id="tetrisBtnDown" class="tetris-ctrl-btn">▼ Runter</button>
                        <button id="tetrisBtnRight" class="tetris-ctrl-btn">▶ Rechts</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="snakeContainer" class="game-container" style="display: none;">
            <div class="container">
                <h1>Snake</h1>
                <div class="controls">
                    <button id="resetSnakeBtn">Neues Spiel</button>
                </div>
                <div id="snakeStatus">Punkte: 0</div>
                <div class="snake-game-area">
                    <canvas id="snakeCanvas" width="400" height="400"></canvas>
                </div>
                <div class="snake-mobile-controls">
                    <div class="snake-controls-row">
                        <button id="snakeBtnUp" class="snake-ctrl-btn">▲</button>
                    </div>
                    <div class="snake-controls-row">
                        <button id="snakeBtnLeft" class="snake-ctrl-btn">◀</button>
                        <button id="snakeBtnDown" class="snake-ctrl-btn">▼</button>
                        <button id="snakeBtnRight" class="snake-ctrl-btn">▶</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="pongContainer" class="game-container" style="display: none;">
            <div class="container">
                <h1>Pong</h1>
                <div class="controls">
                    <div class="mode-selection">
                        <label for="pongMode">Modus:</label>
                        <select id="pongMode">
                            <option value="2p">2 Spieler</option>
                            <option value="1p">1 Spieler (vs Computer)</option>
                        </select>
                    </div>
                    <button id="resetPongBtn">Neues Spiel</button>
                </div>
                <div id="pongStatus">Player 1: 0 | Player 2: 0</div>
                <div class="pong-game-area">
                    <canvas id="pongCanvas" width="600" height="400"></canvas>
                </div>
                <div class="pong-mobile-controls">
                    <div class="pong-controls-row">
                        <button id="pongBtnLeftUp" class="pong-ctrl-btn">P1 ▲</button>
                        <button id="pongBtnLeftDown" class="pong-ctrl-btn">P1 ▼</button>
                        <span class="pong-label">|</span>
                        <button id="pongBtnRightUp" class="pong-ctrl-btn">P2 ▲</button>
                        <button id="pongBtnRightDown" class="pong-ctrl-btn">P2 ▼</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="spaceInvadersContainer" class="game-container" style="display: none;">
            <div class="container">
                <h1>Space Invaders</h1>
                <div class="controls">
                    <button id="resetSpaceInvadersBtn">Neues Spiel</button>
                </div>
                <div id="spaceInvadersStatus">Punkte: 0</div>
                <div class="space-invaders-game-area">
                    <canvas id="spaceInvadersCanvas" width="480" height="400"></canvas>
                </div>
                <div class="space-invaders-mobile-controls">
                    <div class="space-invaders-controls-row">
                        <button id="spaceInvadersBtnLeft" class="space-invaders-ctrl-btn">◀ Links</button>
                        <button id="spaceInvadersBtnShoot" class="space-invaders-ctrl-btn">🔀 Schießen</button>
                        <button id="spaceInvadersBtnRight" class="space-invaders-ctrl-btn">Rechts ▶</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="breakoutContainer" class="game-container" style="display: none;">
            <div class="container">
                <h1>Breakout</h1>
                <div class="controls">
                    <button id="resetBreakoutBtn">Neues Spiel</button>
                </div>
                <div id="breakoutStatus">Punkte: 0 | Leben: 3</div>
                <div class="breakout-game-area">
                    <canvas id="breakoutCanvas" width="480" height="400"></canvas>
                </div>
                <div class="breakout-mobile-controls">
                    <div class="breakout-controls-row">
                        <button id="breakoutBtnLeft" class="breakout-ctrl-btn">◀ Links</button>
                        <button id="breakoutBtnRight" class="breakout-ctrl-btn">Rechts ▶</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="boulderDashContainer" class="game-container" style="display: none;">
            <div class="container">
                <h1>Boulder Dash</h1>
                <div class="controls">
                    <button id="resetBdBtn">Neues Spiel</button>
                </div>
                <div id="bdStatus">Sammle 💎 0/0</div>
                <div class="bd-game-area">
                    <canvas id="bdCanvas" width="400" height="400"></canvas>
                </div>
                <div class="bd-mobile-controls">
                    <div class="bd-controls-row">
                        <button id="bdBtnUp" class="bd-ctrl-btn">▲</button>
                    </div>
                    <div class="bd-controls-row">
                        <button id="bdBtnLeft" class="bd-ctrl-btn">◀</button>
                        <button id="bdBtnDown" class="bd-ctrl-btn">▼</button>
                        <button id="bdBtnRight" class="bd-ctrl-btn">▶</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
